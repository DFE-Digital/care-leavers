name: Link Validation Check
permissions:
  contents: read
on:
  workflow_dispatch:
  schedule:
    - cron: "00 02 * * 1-5"

jobs:
  scan-website-links:
    runs-on: ubuntu-latest
    environment: elz-test
    env:
      WEBSITE_ROOT: ${{ vars.APP_WEBSITE_ROOT }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: "./src/utilities/package-lock.json"

      - name: Install npm packages used by util scripts
        working-directory: ./src/utilities
        run: npm ci --ignore-scripts

      - name: Scan for broken links
        working-directory: ./src/utilities
        run: |
          if [ -z "$WEBSITE_ROOT" ]; then
            echo "Error: WEBSITE_ROOT is not set."
            exit 1
          fi
          node scan-website-links.js
