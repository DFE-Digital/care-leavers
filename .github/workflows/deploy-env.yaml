name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: "Environment to deploy to"
        required: true
        default: "elz-test"
        options:
          - "elz-test"
          - "elz-staging"
          - "elz-production"

run-name: ${{ github.event_name == 'push' && 'Deploy to Test' || format('Deploy to {0}', github.event.inputs.environment) }}

concurrency:
  group: "${{ github.workflow }}-${{ github.event_name == 'push' && 'elz-test' || github.event.inputs.environment }}"
  cancel-in-progress: false

env:
  TAG_NAME: "${{ github.sha }}"
  ENVIRONMENT_PREFIX: "s272${{ vars.ENVIRONMENT_PREFIX}}"

jobs:
  package:
    name: Package Web in Docker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.ref }}

      - name: Lowercase Repository Name
        id: lowercase
        uses: ./.github/actions/lowercase
        with:
          value: ${{ github.repository }}

      - name: Build Web Docker Image
        run: |
          docker build . -t ${TAG} -f web/CareLeavers.Web/Dockerfile
        env:
          TAG: ghcr.io/${{ steps.lowercase.outputs.lowercased_value }}:${{ env.TAG_NAME }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Web Docker Image
        run: |
          docker push ${TAG}
        env:
          TAG: ghcr.io/${{ steps.lowercase.outputs.lowercased_value }}:${{ env.TAG_NAME }}

  deploy:
    name: Deploying to ${{ github.event_name == 'push' && 'elz-test' || github.event.inputs.environment }}
    needs: [package]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: ${{ github.event_name == 'push' && 'elz-test' || github.event.inputs.environment }}
    env:
      ARM_CLIENT_ID: "${{ secrets.AZURE_CLIENT_ID }}"
      ARM_SUBSCRIPTION_ID: "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
      ARM_TENANT_ID: "${{ secrets.AZURE_TENANT_ID }}"
      ARM_CLIENT_SECRET: "${{ secrets.AZURE_CLIENT_SECRET }}"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.ref }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_version: 1.10.4
          terraform_wrapper: false

      - name: Azure CLI Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
        with:
          creds: |
            {
                "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
                "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
                "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
                "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      # Ensure PAL metadata is set on the deployment principal
      - name: Service principal metadata
        continue-on-error: true
        run: |
          az rest --method put --uri "https://management.azure.com/providers/microsoft.managementpartner/partners/6084223?api-version=2018-02-01" --body '{"partnerId": "6084223"}' || true

      - name: Add Alert Management Provider
        run: |
          az provider register --namespace Microsoft.AlertsManagement

      - name: Lowercase Repository Name
        id: lowercase
        uses: ./.github/actions/lowercase
        with:
          value: ${{ github.repository }}

      - name: Unlock Terraform State
        id: terraform_unlock
        uses: ./.github/actions/manage-storage-network-access
        with:
          storage_account_name: ${{ env.ENVIRONMENT_PREFIX }}cltfstate
          resource_group_name: ${{ env.ENVIRONMENT_PREFIX }}rg-uks-cl-tfstate
          enable_network_access: true

      - name: Terraform Init
        id: terraform_init
        working-directory: ./src/infrastructure/terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=${ENVIRONMENT_PREFIX}rg-uks-cl-tfstate" \
            -backend-config="storage_account_name=${ENVIRONMENT_PREFIX}cltfstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate"

      - name: Terraform Plan
        id: terraform_plan
        working-directory: ./src/infrastructure/terraform
        run: |
          terraform plan -out plan.plan -var-file="env_vars/${ENVIRONMENT}.tfvars"
        env:
          ENVIRONMENT: ${{ github.event_name == 'push' && 'elz-test' || github.event.inputs.environment }}
          TF_VAR_contentful_delivery_api_key: ${{ secrets.CONTENTFUL_DELIVERY_API_KEY }}
          TF_VAR_contentful_preview_api_key: ${{ secrets.CONTENTFUL_PREVIEW_API_KEY }}
          TF_VAR_contentful_management_api_key: ${{ secrets.CONTENTFUL_MANAGEMENT_TOKEN }}
          TF_VAR_contentful_space_id: ${{ secrets.CONTENTFUL_SPACE_ID }}
          TF_VAR_support_alert_email: ${{ secrets.SUPPORT_ALERT_EMAIL }}
          TF_VAR_basic_auth_credentials: ${{ secrets.BASIC_AUTH_CREDS }}

      - name: Terraform Apply
        id: terraform_apply
        working-directory: ./src/infrastructure/terraform
        run: |
          terraform apply plan.plan

      - name: Lock Terraform State
        if: ${{ always() }}
        id: terraform_lock
        uses: ./.github/actions/manage-storage-network-access
        with:
          storage_account_name: ${{ env.ENVIRONMENT_PREFIX }}cltfstate
          resource_group_name: ${{ env.ENVIRONMENT_PREFIX }}rg-uks-cl-tfstate
          enable_network_access: false

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383
        with:
          app-name: "${{ env.ENVIRONMENT_PREFIX }}-uks-cl-web-app-service"
          slot-name: "${{vars.WEB_APP_SLOT}}"
          images: "ghcr.io/${{ steps.lowercase.outputs.lowercased_value }}:${{ env.TAG_NAME }}"

      - name: Swap Slot to Production
        if: github.event.inputs.environment == 'elz-production'
        run: |
          az webapp deployment slot swap --name ${ENVIRONMENT_PREFIX}-uks-cl-web-app-service --resource-group ${ENVIRONMENT_PREFIX}rg-uks-cl-web --slot staging --target-slot production

      - name: Delete Staging Slot
        if: github.event.inputs.environment == 'elz-production'
        run: |
          az webapp deployment slot delete --name ${ENVIRONMENT_PREFIX}-uks-cl-web-app-service --resource-group ${ENVIRONMENT_PREFIX}rg-uks-cl-web --slot staging

      - name: Clear Cache
        shell: bash
        run: |
          curl -X POST "https://${CUSTOM_DOMAIN}/b0e0dce2-b96d-4b94-a800-63c3ab56e72f"
        env:
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
