name: Validate - Accessibility

on:
  workflow_dispatch:
    inputs:
      domain_prefix:
        type: choice
        description: 'Domain prefix to run against'
        required: true
        default: 'test'
        options:
          - 'test'
          - 'staging'
          - 'www'

jobs:
  accessibility-scan:
    name: 'Run Pa11y Accessibility Scan'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.JS
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/Krypton'

      - name: Run Accessibility Scan
        working-directory: ./src/e2e/pa11y
        run: |
          yarn install --production=true
          yarn pa11y-ci --config pa11y.json --sitemap https://${{ github.event.inputs.domain_prefix }}.support-for-care-leavers.education.gov.uk/sitemap.xml
