name: Deploy with Tag

on:
  workflow_run:
    workflows: ["Create tag and publish image"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: "Environment to deploy to"
        required: true
        default: "elz-test"
        options:
          - "elz-test"
          - "elz-staging"
          - "elz-production"

run-name: ${{ github.event_name == 'push' && 'Deploy to Test' || format('Deploy to {0}', github.event.inputs.environment) }}

permissions: {}

concurrency:
  group: "deploy-${{ github.event_name == 'push' && 'elz-test' || github.event.inputs.environment }}"
  cancel-in-progress: false

env:
  TAG_NAME: "${{ github.ref_name }}"
  ENVIRONMENT_PREFIX: "s272${{ vars.ENVIRONMENT_PREFIX }}"

jobs:
  configure_run_and_validate_tag:
    name: Configure Workflow Run
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    outputs:
      should_run: ${{ steps.check_status.outputs.should_run || steps.check_validate.outputs.should_run }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.ref }}
          persist-credentials: false

      - name: Check Upstream Deployment Status
        if: github.event_name == 'workflow_run'
        id: check_status
        run: |
          if [[ '${WORKFLOW_CONCLUSION}' == 'success' ]]; then
            echo 'should_run=true' >> $GITHUB_OUTPUT
            echo 'Proceeding with Deployment'
          else
            echo 'should_run=false' >> $GITHUB_OUTPUT
            echo '### Cancelled workflow run as Create tag and publish image failed :warning:' >> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY
            echo 'This workflow run was triggered by the completion of the Create tag and publish image workflow.' >> $GITHUB_STEP_SUMMARY
            echo 'However, as that run failed, this deploy workflow has been cancelled.'>> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY
            echo '[View failed Create tag and publish image run](${WORKFLOW_URL})'>> $GITHUB_STEP_SUMMARY
            gh run cancel ${GITHUB_RUN_ID}
          fi
        env:
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_URL: ${{ github.event.workflow_run.html_url}}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Validation
        id: tag_validation
        if: github.event_name == 'workflow_dispatch'
        uses: ./.github/actions/validate-deploy
        with:
          deploy: "tag"

      - name: Proceed with Deployment
        if: github.event_name == 'workflow_dispatch'
        id: check_validate
        run: |
          if [[ '${TAG_VALIDATION}' == 'success' ]]; then
            echo 'should_run=true' >> $GITHUB_OUTPUT
            echo 'Proceeding with Deployment'
          else
            echo 'should_run=false' >> $GITHUB_OUTPUT
            echo '### Cancelled workflow run as it has been determined a tag is not being used :warning:' >> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY
            gh run cancel ${GITHUB_RUN_ID}
          fi
        env:
          TAG_VALIDATION: ${{ steps.tag_validation.outcome }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploying to ${{ github.event_name == 'push' && 'elz-test' || github.event.inputs.environment }}
    needs: [configure_run_and_validate_tag]
    if: needs.configure_run_and_validate_tag.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Run Deploy Action
        uses: ./.github/actions/deploy
        with:
          environment: ${{ github.event_name == 'push' && 'elz-test' || github.event.inputs.environment }}
          webapp_slot: ${{ vars.WEB_APP_SLOT }}
          custom_domain: ${{ vars.CUSTOM_DOMAIN }}
          environment_prefix: ${{ env.ENVIRONMENT_PREFIX }}
          tag_name: ${{ env.TAG_NAME }}
          AZURE_CLIENT_ID_SECRET: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_SUBSCRIPTION_ID_SECRET: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_TENANT_ID_SECRET: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          CONTENTFUL_DELIVERY_API_KEY_SECRET: ${{ secrets.CONTENTFUL_DELIVERY_API_KEY }}
          CONTENTFUL_PREVIEW_API_KEY_SECRET: ${{ secrets.CONTENTFUL_PREVIEW_API_KEY }}
          CONTENTFUL_MANAGEMENT_TOKEN_SECRET: ${{ secrets.CONTENTFUL_MANAGEMENT_TOKEN }}
          CONTENTFUL_SPACE_ID_SECRET: ${{ secrets.CONTENTFUL_SPACE_ID }}
          SUPPORT_ALERT_EMAIL_SECRET: ${{ secrets.SUPPORT_ALERT_EMAIL }}
          BASIC_AUTH_CREDS_SECRET: ${{ secrets.BASIC_AUTH_CREDS }}
