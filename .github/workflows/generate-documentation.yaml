name: Generate - Documentation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: 
      - main
    paths:
      - 'src/infrastructure/terraform/**'

permissions: {}

jobs:
  generate:
    name: CI Generate Docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate Terraform documentation
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c
        with:
          working-dir: src/infrastructure/terraform
          config-file: ${{ github.workspace }}/.terraform-docs.yml
          output-file: ${{ github.workspace }}/docs/content/architecture/05-terraform.md
          output-method: inject
          git-push: "false"

      - name: Check for changes
        id: verify-changed-files
        run: |
          if git diff --quiet -- "docs/content/architecture/05-terraform.md"; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No documentation changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Documentation changes detected"
          fi

      - name: Create Pull Request
        if: steps.verify-changed-files.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          commit-message: "docs(terraform): update generated documentation"
          title: "docs(terraform): update generated documentation"
          body: "Auto-generated Terraform documentation updates based on recent changes to main."
          branch: "chore/update-tf-docs"
          base: "main"