name: Create tag and publish image

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  tag_release:
    name: Create New Tag
    runs-on: ubuntu-latest
    outputs:
      tag_version: ${{ steps.tag_version.outputs.new_tag }}
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
          persist-credentials: false
          
      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  package:
    name: Package Web in Docker
    runs-on: ubuntu-latest
    needs: [tag_release]
    env:
      TAG_NAME: "${{ needs.tag_release.outputs.tag_version }}"
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ env.TAG_NAME }}
          persist-credentials: false

      - name: Build Image
        uses: ./.github/actions/build-webapp-image
        with:
          tag_name: ${{ env.TAG_NAME }}
          github_token_secret: ${{ secrets.GITHUB_TOKEN }}
        