name: Create tag and publish image

on:
  push:
    branches:
      - main

jobs:
  tag_release:
    name: Create New Tag
    runs-on: ubuntu-latest
    outputs:
      tag_version: ${{ steps.tag_version.outputs.new_tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          
      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  package:
    name: Package Web in Docker
    runs-on: ubuntu-latest
    needs: [tag_release]
    env:
      TAG_NAME: "${{ needs.tag_release.outputs.tag_version }}"
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Build Image
        uses: ./.github/actions/build-webapp-image
        with:
          tag_name: ${{ env.TAG_NAME }}
        