name: Generate - Zap Scan

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: "Environment to run scan against"
        required: true
        default: "elz-staging"
        options:
          - "elz-test"
          - "elz-staging"
          - "elz-production"
  schedule:
    - cron: "0 3 * * 1-5"
      
permissions: {}

run-name: Running ZAP scan against ${{ github.event.inputs.environment || 'elz-staging'}}
jobs:
  zap_scan:
    name: "Run Zap Scan"
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'elz-staging' }}
    steps:
      - name: "Checkout source"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: "Az CLI login"
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
        with:
          creds: |
            {
                "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
                "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
                "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
                "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Get Azure Frontdoor URL
        run: |
          FRONTDOOR_URL=$(az afd custom-domain list \
            -g s272${{ vars.ENVIRONMENT_PREFIX }}rg-uks-cl-web \
            --profile-name s272${{ vars.ENVIRONMENT_PREFIX }}-uks-cl-web-fd-profile \
            --query "[0].hostName" -o tsv)

          echo "FRONTDOOR_URL=$FRONTDOOR_URL" >> ${GITHUB_ENV}

      - name: "Running ZAP scan against https://${{ env.FRONTDOOR_URL }}"
        uses: zaproxy/action-full-scan@3c58388149901b9a03b7718852c5ba889646c27c
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: "ghcr.io/zaproxy/zaproxy:stable"
          target: "https://${{ env.FRONTDOOR_URL }}"
          rules_file_name: "src/rules.tsv"
          cmd_options: >-
            -a -z -c src/zapscan.options
            ${{ github.event.inputs.environment != 'elz-production' && format('-config "replacer.full_list(0).description=auth" -config "replacer.full_list(0).enabled=true" -config "replacer.full_list(0).matchtype=REQ_HEADER" -config "replacer.full_list(0).matchstr=Authorization" -config "replacer.full_list(0).regex=false" -config "replacer.full_list(0).replacement={0}"', secrets.BASIC_AUTH_CREDS) || '' }}
          allow_issue_writing: "false"
          artifact_name: "zap-action-report"

      - name: Download ZAP report artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: zap-action-report
          path: ./zap-report

      - name: List all files in zap-report
        run: find ./zap-report

      - name: Output ZAP report to GitHub Step Summary
        if: always()
        run: |
          if [ -f ./zap-report/report_md.md ]; then
            echo "## 🛡️ ZAP Security Scan Summary" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Full report exceeds 1MB limit.**" >> $GITHUB_STEP_SUMMARY
            echo "[Download Full Report from Artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
            grep -A 20 "Alerts" ./zap-report/report_md.md >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ ZAP report_md.md not found." >> $GITHUB_STEP_SUMMARY
          fi
