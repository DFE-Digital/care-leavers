name: Generate - Zap Scan

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: "Environment to run scan against"
        required: true
        default: "elz-test"
        options:
          - "elz-test"
          - "elz-staging"
          - "elz-production"

run-name: Running ZAP scan against ${{ github.event.inputs.environment }}
jobs:
  zap_scan:
    name: "Run Zap Scan"
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
    steps:
      - name: "Checkout source"
        uses: actions/checkout@v6

      - name: "Az CLI login"
        uses: azure/login@v2
        with:
          creds: |
            {
                "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
                "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
                "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
                "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Get Azure Frontdoor URL
        run: |
          FRONTDOOR_URL=$(az afd endpoint list -g s272${{ vars.ENVIRONMENT_PREFIX }}rg-uks-cl-web --profile-name s272${{ vars.ENVIRONMENT_PREFIX }}-uks-cl-web-fd-profile | jq -r '.[0].hostName')
          echo "FRONTDOOR_URL=$FRONTDOOR_URL" >>${GITHUB_ENV}

      - name: "Running ZAP scan against https://${{ env.FRONTDOOR_URL }}"
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: "ghcr.io/zaproxy/zaproxy:stable"
          target: "https://${{ env.FRONTDOOR_URL }}"
          rules_file_name: "src/rules.tsv"
          cmd_options: "-a -z -c src/zapscan.options"
          allow_issue_writing: "false"
          artifact_name: "zap-action-report"

      - name: Download ZAP report artifact
        uses: actions/download-artifact@v7
        with:
          name: zap-action-report
          path: ./zap-report

      - name: List all files in zap-report
        run: find ./zap-report

      - name: Output ZAP report to GitHub Step Summary
        if: always()
        run: |
          if [ -f ./zap-report/report_md.md ]; then
            echo "## 🔍 OWASP ZAP Security Scan Report" >> $GITHUB_STEP_SUMMARY
            cat ./zap-report/report_md.md >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ ZAP report_md.md not found." >> $GITHUB_STEP_SUMMARY
          fi
