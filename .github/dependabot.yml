version: 2
updates:
  - package-ecosystem: "terraform"
    directory: "/src/infrastructure/terraform"
    cooldown: 
      default-days: 7
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "[terraform] "
    open-pull-requests-limit: 5
    groups:
      terraform-deps:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "[github actions] "
    open-pull-requests-limit: 5
    groups:
      actions-deps:
        patterns:
          - "*"

  - package-ecosystem: "nuget"
    directory: "/src"
    cooldown:
      default-days: 7
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "[nuget] "
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "Microsoft.*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Serilog.AspNetCore"
        update-types: [ "version-update:semver-major" ]
    groups:
      nuget-deps:
        patterns:
          - "*"
  
  - package-ecosystem: npm
    directories:
      - "/src/e2e/CareLeavers.E2ETests"
      - "/src/e2e/pa11y"
      - "/src/utilities"
      - "/src/web/CareLeavers.Web"
      - "/src/contentful/Synchronisation"
    cooldown:
      default-days: 7
    schedule: 
      interval: "weekly"
    commit-message: 
      prefix: "[npm] "
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "govuk-frontend"
        update-types: [ "version-update:semver-major" ]
      - dependency-name: "dfe-frontend"
        update-types: [ "version-update:semver-major" ]
    groups:
      npm-deps:
        patterns:
          - "*"