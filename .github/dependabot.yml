version: 2
updates:
  - package-ecosystem: "terraform"
    directory: "/src/infrastructure/terraform"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "[terraform] "
    open-pull-requests-limit: 5
    groups:
      terraform-deps:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "[github actions] "
    open-pull-requests-limit: 5
    groups:
      actions-deps:
        patterns:
          - "*"

  - package-ecosystem: "nuget"
    directory: "/src"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "[nuget] "
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "Microsoft.*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Serilog.AspNetCore"
        update-types: [ "version-update:semver-major" ]
    groups:
      nuget-deps:
        patterns:
          - "*"
  
  - package-ecosystem: npm
    directories:
      - "/src/CareLeavers.E2ETests"
      - "/src/pa11y"
      - "/src/utilities"
      - "/src/web/CareLeavers.Web"
    schedule: 
      interval: "weekly"
    commit-message: 
      prefix: "[npm] "
    open-pull-requests-limit: 5
    groups:
      npm-deps:
        group-by: dependency-name
        patterns:
          - "*"