name: Build Web App Image
description: Action to build the web app image

inputs:
  tag_name:
    description: The tag for the package to be built
    required: true
    type: string
    
runs:
  using: composite
  defaults:
      run:
        working-directory: ./src
  steps:
    - name: Lowercase Repository Name
      id: lowercase
      uses: ./.github/actions/lowercase
      with:
        value: ${{ github.repository }}

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Web Docker Image
      run: |
        docker build . -t ghcr.io/${{ steps.lowercase.outputs.lowercased_value }}:${{ inputs.tag_name }} -f web/CareLeavers.Web/Dockerfile

    - name: Push Web Docker Image
      run: |
        docker push ghcr.io/${{ steps.lowercase.outputs.lowercased_value }}:${{ inputs.tag_name }}
    